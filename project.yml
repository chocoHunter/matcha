name: Matcha
options:
  bundleIdPrefix: com.matcha
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  Matcha:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources
        buildPhase: resources
        excludes:
          - "**/.DS_Store"
          - "Matcha.iconset/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matcha.Matcha
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Matcha.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/Matcha.entitlements
  MatchaTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MatchaTests
    dependencies:
      - target: Matcha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matcha.MatchaTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Matcha.app/Contents/MacOS/Matcha"
        BUNDLE_LOADER: "$(TEST_HOST)"
